{% extends "base.html" %}

{% block content %}

<div class="main-container">

    <!-- LEFT: POST JOB -->
    <div class="left">
        <div class="card">
            <h2>Post a Freelance Job</h2>

            <form method="POST" action="/freelance">
                <input type="text" name="title" placeholder="Job Title" required>

                <textarea name="description" placeholder="Describe the work..." required></textarea>

                <input type="number" name="price" placeholder="Budget (₹)" required>

                <input type="tel" name="contact" placeholder="Phone" required>

                <button type="submit">Post Job</button>
            </form>
        </div>
    </div>

    <!-- RIGHT: JOBS -->
    <div class="right">
        <h2>Available Jobs</h2>

        {% for job in jobs %}
        <div class="job-card">
            <h3>{{ job.title }}</h3>
            <p>{{ job.description }}</p>
            <p class="price">₹ {{ job.price }}</p>

            <p class="contact">📞 {{ job.contact }}</p>

            <a href="https://wa.me/{{ job.contact }}" target="_blank" class="whatsapp">WhatsApp</a>

            {% if session.get("user") == job.owner %}
            <form method="POST" action="/delete_freelance/{{ job.id }}">
                <button class="delete-btn">Delete</button>
            </form>
            {% endif %}
        </div>
        {% endfor %}
    </div>

</div>

{% endblock %}
